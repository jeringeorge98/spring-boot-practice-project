# Common Configuration (shared across all profiles)
spring.application.name=practice

# Active profile - set via command line or environment variable
# Use: -Dspring.profiles.active=dev or -Dspring.profiles.active=prod
# Or set environment variable: SPRING_PROFILES_ACTIVE=dev or SPRING_PROFILES_ACTIVE=prod
# Default profile if not specified
spring.profiles.active=dev

# Common Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Common JPA/Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT KEY Configuration (common for all profiles)
jwt.keystore.location=classpath:jwt-keystore.jks
jwt.keystore.password=changeit
jwt.keystore.alias=jwt-key
jwt.keystore.key-password=changeit

